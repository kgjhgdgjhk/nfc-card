<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة تجريبية | NFC-001</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2f 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #4361ee, #4cc9f0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 3em;
            color: white;
        }
        h2 { font-size: 2em; margin-bottom: 5px; }
        .title { color: #4cc9f0; margin-bottom: 15px; }
        .info-item {
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .info-item i { color: #4cc9f0; width: 25px; }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }
        .social-links a {
            color: white;
            font-size: 1.8em;
            transition: all 0.3s;
        }
        .social-links a:hover { color: #4cc9f0; transform: translateY(-3px); }
        .demo-badge {
            background: linear-gradient(135deg, #4361ee, #4cc9f0);
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .btn {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #4361ee, #4cc9f0);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(67,97,238,0.3); }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div style="text-align: center;">
            <span class="demo-badge"><i class="fas fa-play"></i> عرض تجريبي</span>
        </div>
        
        <div class="profile-header">
            <div class="avatar">
                <i class="fas fa-user"></i>
            </div>
            <h2>أحمد محمد</h2>
            <div class="title">مطور برمجيات</div>
        </div>

        <div class="info-item">
            <i class="fas fa-briefcase"></i>
            <span>تك المحدودة</span>
        </div>
        <div class="info-item">
            <i class="fas fa-envelope"></i>
            <span>ahmed@example.com</span>
        </div>
        <div class="info-item">
            <i class="fas fa-phone"></i>
            <span>+966 50 123 4567</span>
        </div>
        <div class="info-item">
            <i class="fas fa-map-marker-alt"></i>
            <span>الرياض، المملكة العربية السعودية</span>
        </div>

        <div class="social-links">
            <a href="#"><i class="fab fa-linkedin"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>

        <div style="text-align: center; color: rgba(255,255,255,0.6); margin-bottom: 15px;">
            <i class="fas fa-eye"></i> 1,250 مشاهدة
        </div>

        <a href="/create-profile" class="btn">
            <i class="fas fa-id-card"></i>
            احصل على بطاقتك NFC الآن
        </a>

        <a href="/" class="back-link">
            <i class="fas fa-arrow-right"></i>
            العودة للرئيسية
        </a>
    </div>
</body>
</html>
